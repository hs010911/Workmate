<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - WorkMate</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-brand">
                <a href="index.html" class="nav-logo">WorkMate</a>
            </div>
            <div class="nav-links">
                <a href="index.html">홈</a>
                <a href="projects.html">프로젝트 찾기</a>
                <a href="register.html" class="btn-primary">회원가입</a>
            </div>
            <div class="mobile-menu-btn">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container" style="padding: 4rem 1rem;">
            <div class="form-container">
                <div class="text-center" style="margin-bottom: 2rem;">
                    <h1 style="font-size: 2rem; font-weight: 700; margin-bottom: 0.5rem;">로그인</h1>
                    <p style="color: #6b7280;">계정에 로그인하여 프로젝트를 시작하세요</p>
                </div>

                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="username">아이디</label>
                        <input type="text" id="username" name="username" class="form-input" required>
                        <div id="usernameError" class="error-message" style="display: none; color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem;">ID,PW를 확인해주세요</div>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="password">비밀번호</label>
                        <div class="password-input-wrapper">
                        <input type="password" id="password" name="password" class="form-input" required>
                            <button type="button" class="password-toggle-btn" id="passwordToggle" aria-label="비밀번호 보기/숨기기">
                                <svg class="password-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                                <svg class="password-icon password-icon-hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                    <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                    <line x1="1" y1="1" x2="23" y2="23"></line>
                                </svg>
                            </button>
                        </div>
                        <div id="passwordError" class="error-message" style="display: none; color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem;">비밀번호를 확인해주세요</div>
                    </div>

                    <div class="form-group">
                        <button type="submit" class="btn-primary" style="width: 100%;">로그인</button>
                    </div>
                </form>
            </div>
        </div>
    </main>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/nav.js"></script>
    <script src="js/auth.js"></script>
</body>
</html>
