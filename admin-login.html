<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>관리자 로그인 - WorkMate</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .admin-login-wrap {
            min-height: 100vh;
            background: linear-gradient(135deg, #1e3a5f 0%, #0f172a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        .admin-login-card {
            background: #fff;
            border-radius: 1rem;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
            padding: 2.5rem;
            width: 100%;
            max-width: 420px;
        }
        .admin-login-card h1 {
            font-size: 1.5rem;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 0.25rem;
        }
        .admin-login-card .sub {
            color: #64748b;
            font-size: 0.9rem;
            margin-bottom: 1.75rem;
        }
        .admin-login-card .form-container {
            max-width: none;
        }
        .admin-login-card .btn-primary {
            background: #1e3a5f;
        }
        .admin-login-card .btn-primary:hover {
            background: #2d4a73;
        }
        .admin-login-back {
            display: inline-block;
            margin-top: 1.25rem;
            color: #64748b;
            font-size: 0.9rem;
            text-decoration: none;
        }
        .admin-login-back:hover {
            color: #2563eb;
        }
    </style>
</head>
<body>
    <div class="admin-login-wrap">
        <div class="admin-login-card">
            <h1>관리자 로그인</h1>
            <p class="sub">관리자 계정으로만 로그인할 수 있습니다.</p>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label class="form-label" for="adminUsername">아이디</label>
                    <input type="text" id="adminUsername" name="username" class="form-input" required autocomplete="username">
                    <div id="adminUsernameError" class="error-message" style="display: none; color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem;">ID를 확인해주세요</div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="adminPassword">비밀번호</label>
                    <div class="password-input-wrapper">
                        <input type="password" id="adminPassword" name="password" class="form-input" required autocomplete="current-password">
                        <button type="button" class="password-toggle-btn" id="adminPasswordToggle" aria-label="비밀번호 보기/숨기기">
                            <svg class="password-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                                <circle cx="12" cy="12" r="3"></circle>
                            </svg>
                            <svg class="password-icon password-icon-hidden" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display: none;">
                                <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path>
                                <line x1="1" y1="1" x2="23" y2="23"></line>
                            </svg>
                        </button>
                    </div>
                    <div id="adminPasswordError" class="error-message" style="display: none; color: #ef4444; font-size: 0.875rem; margin-top: 0.25rem;">비밀번호를 확인해주세요</div>
                </div>

                <div class="form-group">
                    <button type="submit" class="btn-primary" style="width: 100%;">관리자 로그인</button>
                </div>
            </form>

            <a href="login.html" class="admin-login-back">사용자 로그인</a>
        </div>
    </div>
    <script src="js/config.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/api.js"></script>
    <script src="js/main.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/admin-login.js"></script>
</body>
</html>
